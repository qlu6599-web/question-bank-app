<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="智题库" />
    <title>智题库 - 刷题 App MVP</title>
    <link rel="manifest" href="./manifest.webmanifest?v=20260614-v7" />
    <link rel="icon" href="./assets/icon-192.svg?v=20260614-v7" />
    <link rel="apple-touch-icon" href="./assets/icon-192.svg?v=20260614-v7" />
    <link rel="stylesheet" href="./styles/app.css?v=20260614-v7" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <button id="backBtn" class="icon-btn hidden" type="button" aria-label="返回">
          <span aria-hidden="true">‹</span>
        </button>
        <div>
          <p id="topEyebrow" class="topbar__eyebrow">MVP 题库系统</p>
          <h1 id="pageTitle" class="topbar__title">智题库</h1>
        </div>
        <button id="modeToggle" class="mode-pill" type="button" aria-label="切换刷题模式">顺序</button>
      </header>

      <main id="view" class="view" aria-live="polite"></main>

      <nav class="tabbar" aria-label="底部导航">
        <button class="tabbar__item is-active" type="button" data-tab="home">
          <span class="tabbar__icon">⌂</span>
          <span>刷题</span>
        </button>
        <button class="tabbar__item" type="button" data-tab="mistakes">
          <span class="tabbar__icon">✕</span>
          <span>错题本</span>
        </button>
        <button class="tabbar__item" type="button" data-tab="stats">
          <span class="tabbar__icon">◷</span>
          <span>统计</span>
        </button>
        <button class="tabbar__item" type="button" data-tab="profile">
          <span class="tabbar__icon">○</span>
          <span>我的</span>
        </button>
      </nav>
    </div>

    <script src="./src/data/questions.js?v=20260614-v7"></script>
    <script src="./src/services/aiTutor.js?v=20260614-v7"></script>
    <script src="./src/services/analytics.js?v=20260614-v7"></script>
    <script src="./src/services/cloudSync.js?v=20260614-v7"></script>
    <script src="./src/services/userService.js?v=20260614-v7"></script>
    <script src="./src/store/appStore.js?v=20260614-v7"></script>
    <script src="./src/utils/dom.js?v=20260614-v7"></script>
    <script src="./src/app.js?v=20260614-v7"></script>
  </body>
</html>
